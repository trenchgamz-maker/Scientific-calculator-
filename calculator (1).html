<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        #calculator {
            background-color: #2d3436;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            width: 280px;
        }

        #display {
            width: 100%;
            height: 50px;
            font-size: 2em;
            text-align: right;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #1e272e;
            color: #00d2d3;
            box-sizing: border-box;
            font-weight: bold;
        }

        .button-row {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }

        button {
            flex: 1;
            height: 60px;
            font-size: 1.5em;
            border: none;
            border-radius: 5px;
            background-color: #636e72;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }

        button:hover {
            background-color: #74b9ff;
        }

        button:active {
            transform: scale(0.95);
        }

        .operator {
            background-color: #ff7675;
        }

        .operator:hover {
            background-color: #fab1a0;
        }

        .clear {
            background-color: #fdcb6e;
            color: #2d3436;
        }

        .clear:hover {
            background-color: #ffeaa7;
        }

        .equals {
            background-color: #00b894;
        }

        .equals:hover {
            background-color: #55efc4;
        }
    </style>
</head>
<body>
    <div id="calculator">
        <input type="text" id="display" disabled />
        <div class="button-row">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="performOperation('/')">÷</button>
            <button class="operator" onclick="performOperation('*')">×</button>
            <button class="operator" onclick="deleteLast()">←</button>
        </div>
        <div class="button-row">
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="performOperation('-')">−</button>
        </div>
        <div class="button-row">
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="performOperation('+')">+</button>
        </div>
        <div class="button-row">
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('.')">.</button>
        </div>
        <div class="button-row">
            <button onclick="appendToDisplay('0')" style="flex: 2;">0</button>
            <button class="equals" onclick="calculateResult()">=</button>
        </div>
    </div>

    <script>
        let currentInput = '';
        let previousValue = '';
        let operation = null;
        let shouldResetDisplay = false;

        function appendToDisplay(value) {
            if (shouldResetDisplay) {
                currentInput = '';
                shouldResetDisplay = false;
            }
            currentInput += value;
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '';
            previousValue = '';
            operation = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            updateDisplay();
        }

        function performOperation(op) {
            if (currentInput === '' && previousValue === '') return;

            if (previousValue === '') {
                previousValue = currentInput;
                currentInput = '';
            } else if (currentInput !== '') {
                let result = calculate(previousValue, currentInput, operation);
                previousValue = result.toString();
                currentInput = '';
            }

            operation = op;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function calculateResult() {
            if (operation === null || currentInput === '') return;

            let result = calculate(previousValue, currentInput, operation);
            currentInput = result.toString();
            previousValue = '';
            operation = null;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function calculate(prev, curr, op) {
            let result = 0;
            let a = parseFloat(prev);
            let b = parseFloat(curr);

            switch (op) {
                case '+':
                    result = a + b;
                    break;
                case '-':
                    result = a - b;
                    break;
                case '*':
                    result = a * b;
                    break;
                case '/':
                    result = b !== 0 ? a / b : 0;
                    break;
                default:
                    result = b;
            }

            return Math.round(result * 100000000) / 100000000;
        }

        function updateDisplay() {
            document.getElementById('display').value = currentInput || '0';
        }

        updateDisplay();
    </script>
</body>
</html>
